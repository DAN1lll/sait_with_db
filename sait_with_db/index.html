<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Отслеживание почтовых отправлений. Введите трек-номер и получите полную информацию о местонахождении посылки.">
    <meta name="keywords" content="отслеживание посылок, почта, трек-номер, доставка">
    <meta name="author" content="Postal Track">
    <meta name="theme-color" content="#667eea">
    
    <title>Postal Track | Отслеживание посылок</title>
    
    <!-- Favicon (base64 для простоты) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='50%' text-anchor='middle' dy='.35em' font-size='60' fill='%23667eea'>📮</text></svg>">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Анимированные фоновые элементы -->
    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>
    <div class="bg-circle circle3"></div>

    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="logo">
                    <span class="logo-icon">📮</span>
                    <span class="logo-text">POSTAL TRACK</span>
                </div>
                <h1>Отслеживание посылок</h1>
                <p class="subtitle">Введите трек-номер для отслеживания отправления</p>
            </div>

            <!-- Форма поиска -->
            <div class="search-box">
                <input type="text" class="search-input" id="trackingInput" placeholder="TRK001" value="TRK001" autocomplete="off">
                <button class="search-btn" id="trackBtn">
                    <span>🔍</span> Отследить
                </button>
            </div>

            <!-- Статус бар -->
            <div class="status-bar">
                <span>🚚 Система отслеживания</span>
                <span class="status-badge badge-online" id="apiStatus">
                    <span class="dot dot-green"></span> API активен
                </span>
            </div>

            <!-- Контейнер для результатов -->
            <div id="resultContainer"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>🔒 Все данные передаются по защищённому каналу</span>
            <span class="footer-sep">•</span>
            <span>© 2024 Почтовая система</span>
            <span class="footer-sep">•</span>
            <span>Версия 2.0</span>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>

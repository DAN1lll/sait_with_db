<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Directory | Демо-приложение</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>
        <i class="fas fa-users"></i> 
        Staff Directory
      </h1>
      <p>Демо-приложение с Cloudflare D1 — CRUD операции, фильтрация, поиск</p>
    </header>

    <!-- Контролы -->
    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Поиск по имени, фамилии или email...">
      </div>
      <div class="filters">
        <select id="departmentFilter">
          <option value="">Все отделы</option>
        </select>
        <button id="addEmployeeBtn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Добавить сотрудника
        </button>
      </div>
    </div>

    <!-- Таблица сотрудников -->
    <div class="table-container">
      <table id="employeesTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Фото</th>
            <th>ФИО</th>
            <th>Email</th>
            <th>Телефон</th>
            <th>Отдел</th>
            <th>Дата найма</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="employeesBody">
          <tr><td colspan="8" class="loading">Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Модальное окно для добавления/редактирования -->
  <div id="employeeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Добавить сотрудника</h2>
        <span class="close">&times;</span>
      </div>
      <form id="employeeForm">
        <input type="hidden" id="employeeId">
        <div class="form-group">
          <label>Имя *</label>
          <input type="text" id="firstName" required>
        </div>
        <div class="form-group">
          <label>Фамилия *</label>
          <input type="text" id="lastName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>
        <div class="form-group">
          <label>Телефон</label>
          <input type="tel" id="phone">
        </div>
        <div class="form-group">
          <label>Отдел *</label>
          <select id="departmentId" required></select>
        </div>
        <div class="form-group">
          <label>Дата найма</label>
          <input type="date" id="hireDate">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Сохранить</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
